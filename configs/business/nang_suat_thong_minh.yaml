# ================================================================
# NĂNG SUẤT THÔNG MINH - Intelligent Productivity Video
# ================================================================

# ===== VOICE CATALOG =====
voices:
  - id: "mentor_female"
    name: "Mentor Nữ"
    gender: "female"
    providers:
      - provider: "edge"
        model: "vi-VN-HoaiMyNeural"
        speed: 1.0
      - provider: "openai"
        model: "tts-1"
        voice: "alloy"
        speed: 1.0

  - id: "student_male"
    name: "Học sinh Nam"
    gender: "male"
    providers:
      - provider: "edge"
        model: "vi-VN-NamMinhNeural"
        speed: 1.0

# ===== CHARACTERS =====
characters:
  - name: "Mentor"
    voice_id: "mentor_female"

  - name: "Student"
    voice_id: "student_male"

# ===== SCENES =====
scenes:
  - id: 1
    tts: "Xin chào các bạn! Bạn có muốn làm việc hiệu quả hơn không? Hôm nay tôi sẽ chia sẻ 3 nguyên tắc quản lý thời gian rất hiệu quả."
    video_prompt: "A friendly female teacher standing in modern bright office, warm welcoming smile, gesturing enthusiastically"
    characters:
      - name: "Mentor"
    background: "office"

  - id: 2
    tts: "Nguyên tắc thứ nhất: Viết ra ba điều quan trọng nhất mỗi sáng. Điều này giúp bạn tập trung vào những gì thực sự quan trọng thay vì bị cuốn vào những việc vặt."
    video_prompt: "Female teacher pointing at whiteboard with THREE KEY PRIORITIES written, focused and confident expression"
    characters:
      - name: "Mentor"
    background: "office"

  - id: 3
    video_prompt: "Female teacher and male student having an engaging conversation in modern classroom, both looking at camera and talking"
    characters:
      - name: "Mentor"
        tts: "Nguyên tắc thứ hai: Làm việc theo block 90 phút. Tập trung hoàn toàn vào một nhiệm vụ trong 90 phút, sau đó nghỉ ngắn 15 phút."
        speed: 1.0
      - name: "Student"
        tts: "Ý kiến hay! Tôi sẽ áp dụng ngay. Còn nguyên tắc thứ ba là gì?"
        speed: 1.1
    background: "classroom"

  - id: 4
    tts: "Nguyên tắc thứ ba: Nghỉ ngơi và tái tạo năng lượng. Não bộ cần thời gian để xử lý thông tin. Hãy đứng dậy và vận động mỗi giờ!"
    video_prompt: "Female teacher stretching and relaxing, smiling confidently in bright office"
    characters:
      - name: "Mentor"
    background: "office"

# ===== VIDEO =====
video:
  aspect_ratio: "9:16"
  resolution: "480p"

background_music:
  enable: true
  file: "random"
  volume: 0.15
  fade_duration: 2

watermark:
  enable: true
  text: "@NangSuatThongMinh"
  font_size: 30
  opacity: 0.15
  motion: "bounce"
  bounce_speed: 80
  bounce_padding: 20
  velocity_x: 1.2
  velocity_y: 0.8
  margin: 8

subtitle:
  font_size: 60

# ===== MODELS =====
models:
  tts: "edge"
  image: "minimax"
  video: "kieai"

tts:
  max_duration: 15.0
  min_duration: 5.0
  words_per_second: 2.5

lipsync:
  provider: "kieai"
  resolution: "480p"
  max_wait: 300

llm:
  provider: "minimax"
  model: "MiniMax-M2.7"
  max_tokens: 2048

# ===== SOCIAL =====
social:
  facebook:
    page_name: "Năng Suất Thông Minh"
    auto_publish: false
  tiktok:
    account_name: "@NangSuatThongMinh"
    auto_publish: false
