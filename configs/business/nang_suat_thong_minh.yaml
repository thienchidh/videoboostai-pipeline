prompt:
  style: "3D animated Pixar Disney style, high quality 3D render, ultra detailed, vibrant colors, smooth animation, cinematic lighting, modern professional"
  script_hints:
    office: "modern bright office workspace, professional working environment, computer desk setup, plants and natural light, organized and productive space, Pixar Disney quality"
    default: "modern professional setting, bright colorful atmosphere, Pixar Disney quality"

characters:
  - name: "Mentor"
    description: "friendly wise female mentor character, glasses, professional casual attire, warm encouraging smile"
    prompt: "3D animated Pixar Disney style friendly professional female mentor, wearing smart casual clothes with glasses, warm welcoming smile, confident teaching pose, standing in modern bright office with large window and plants, natural lighting, Disney Pixar high quality 3D render, cinematic lighting, vibrant colors"
    avatar_file: ""
    tts_voice: "vi-VN-HoaiMyNeural"
    tts_speed: 1.0
    auto_create: true

scenes:
  - id: 1
    script: "Xin chào các bạn! Bạn có muốn làm việc hiệu quả hơn không? Hôm nay tôi sẽ chia sẻ 3 nguyên tắc quản lý thời gian rất hiệu quả."
    characters: ["Mentor"]
    background: "office"

  - id: 2
    script: "Nguyên tắc thứ nhất: Viết ra ba điều quan trọng nhất mỗi sáng. Điều này giúp bạn tập trung vào những gì thực sự quan trọng thay vì bị cuốn vào những việc vặt."
    characters: ["Mentor"]
    background: "office"

  - id: 3
    script: "Nguyên tắc thứ hai: Làm việc theo block 90 phút. Tập trung hoàn toàn vào một nhiệm vụ trong 90 phút, sau đó nghỉ ngắn 15 phút. Não bộ sẽ hoạt động hiệu quả hơn gấp 3 lần."
    characters: ["Mentor"]
    background: "office"

