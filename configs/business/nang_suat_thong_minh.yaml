video:
  title: "Năng Suất Thông Minh - 3 Nguyên Tắc Để Làm Việc Hiệu Quả Hơn"
  aspect_ratio: "9:16"
  style: "3D animated Pixar Disney style, high quality 3D render, ultra detailed, vibrant colors, smooth animation, cinematic lighting"
  resolution: "480p"
  fps: 25

subtitle:
  enable: true
  font_size: 40
  color: "yellow"
  language: "vi"

