# ================================================================
# MINIMAL TEST SCENARIO - For fixture generation
# ================================================================
# Very short scripts to minimize API costs and generation time
# ================================================================

voices:
  - id: "test_voice"
    name: "Test Voice"
    gender: "female"
    providers:
      - provider: "edge"
        model: "vi-VN-HoaiMyNeural"
        speed: 1.0

characters:
  - name: "TestChar"
    voice_id: "test_voice"

scenes:
  - id: 1
    tts: "Xin chào"
    video_prompt: "A friendly cartoon character smiling warmly"
    characters:
      - name: "TestChar"
    background: "default"

  - id: 2
    tts: "Tạm biệt"
    video_prompt: "A friendly cartoon character waving goodbye"
    characters:
      - name: "TestChar"
    background: "default"

video:
  aspect_ratio: "9:16"
  resolution: "480p"

background_music:
  enable: false

watermark:
  enable: false

subtitle:
  font_size: 60

models:
  tts: "edge"
  image: "minimax"
  video: "kieai"

tts:
  max_duration: 15.0
  min_duration: 2.0
  words_per_second: 2.5

lipsync:
  provider: "kieai"
  resolution: "480p"
  max_wait: 300

llm:
  provider: "minimax"
  model: "MiniMax-M2.7"
  max_tokens: 1536

social:
  facebook:
    page_name: ""
    auto_publish: false
  tiktok:
    account_name: ""
    auto_publish: false
