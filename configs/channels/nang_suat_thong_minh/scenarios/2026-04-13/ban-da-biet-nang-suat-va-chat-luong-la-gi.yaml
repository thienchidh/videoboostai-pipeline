title: 'Bạn đã biết: năng suất và chất lượng là gì?'
scenes:
- id: 1
  script: Hầu hết mọi người làm việc cả ngày nhưng không biết mình đang đo lường cái
    gì. Năng suất không phải là làm nhiều — mà là làm đúng lượng công việc trong thời
    gian tối ưu. Bạn có đang nhầm lẫn giữa bận rộn và hiệu quả không?
  background: bàn làm việc ngăn nắp với màn hình hiển thị biểu đồ, 3D render, warm,
    eye-level, modern office, professional
  character: Mentor
- id: 2
  script: 'Năng suất là lượng đầu ra bạn tạo ra so với nguồn lực bỏ vào. Chất lượng
    là mức độ đáp ứng tiêu chuẩn của đầu ra đó. Ví dụ thực tế: viết 10 báo cáo mỗi
    ngày là năng suất cao, nhưng nếu sếp phải sửa lại hết thì chất lượng bằng không.
    Bí quyết là cân bằng cả hai — không thiên về số lượng hay hoàn hảo quá mức.'
  background: không gian văn phòng mở với bảng trắng và ghi chú dán, 3D render, warm,
    eye-level, modern office, professional
  character: Mentor
- id: 3
  script: Vậy trong công việc hằng ngày của bạn, bạn đang ưu tiên năng suất hay chất
    lượng hơn? Hay bạn đã tìm được cách cân bằng cả hai rồi? Comment ngay bên dưới
    cho mình biết nhé — mình đọc hết đấy!
  background: góc làm việc cá nhân ấm áp với cây xanh nhỏ và ly cà phê, 3D render,
    warm, eye-level, modern office, professional
  character: Student
