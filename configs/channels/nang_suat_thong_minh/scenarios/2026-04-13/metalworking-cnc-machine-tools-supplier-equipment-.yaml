title: Metalworking CNC Machine Tools Supplier & Equipment Distributor ...
scenes:
- id: 1
  script: Bạn có biết không? 70% doanh nghiệp CNC tại Việt Nam đang lãng phí hàng
    trăm triệu đồng mỗi năm chỉ vì chọn nhà cung cấp thiết bị không đúng cách. Đây
    là sai lầm mà hầu hết ai cũng mắc phải.
  background: Phòng máy CNC hiện đại, ánh sáng xanh trắng, máy móc đang vận hành
  characters:
  - Mentor
- id: 2
  script: Khi tìm kiếm nhà phân phối máy móc CNC, đừng chỉ nhìn vào giá cả. Hãy hỏi
    về chế độ bảo hành, nguồn phụ tùng thay thế, và đội ngũ hỗ trợ kỹ thuật sau bán
    hàng. Ví dụ, một nhà cung cấp uy tín sẽ cam kết giao hàng trong 24 giờ và hỗ trợ
    lắp đặt miễn phí.
  background: Nhà kho chứa thiết bị CNC, giá kệ sắp xếp ngăn nắp, robot đang vận chuyển
  characters:
  - Mentor
- id: 3
  script: Nếu bạn đang cân nhắc nâng cấp hoặc mở rộng dây chuyền sản xuất, hãy comment
    cho mình biết bạn đang gặp khó khăn gì nhất hiện tại. Mình sẽ gợi ý giải pháp
    phù hợp cho bạn!
  background: Văn phòng hiện đại, màn hình laptop hiển thị bản vẽ kỹ thuật, ánh sáng
    ấm
  characters:
  - Student
