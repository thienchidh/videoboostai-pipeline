title: Metalworking CNC Machine Tools Supplier & Equipment Distributor ...
scenes:
- id: 1
  script: Bạn có biết hơn 60% doanh nghiệp gia công kim loại đã từng gặp vấn đề nghiêm
    trọng với nhà cung cấp thiết bị CNC không? Mình từng chứng kiến một xưởng mất
    cả triệu đô chỉ vì chọn sai đối tác.
  background: xưởng cơ khí công nghiệp, máy CNC đang vận hành, ánh sáng ban ngày
  characters:
  - Mentor
- id: 2
  script: 'Điều đầu tiên cần nhớ là đừng bao giờ chọn nhà phân phối chỉ vì giá rẻ.
    Hãy kiểm tra ba yếu tố: năng lực kỹ thuật, chính sách bảo hành và phản hồi từ
    khách hàng cũ. Một nhà cung cấp uy tín ở Midwest sẽ minh bạch về nguồn gốc linh
    kiện và có đội ngũ hỗ trợ 24/7.'
  background: văn phòng chuyên nghiệp, giấy tờ hợp đồng, màn hình hiển thị thông số
    máy CNC
  characters:
  - Mentor
- id: 3
  script: Nếu bạn đang đối mặt với tình trạng thiết bị CNC hay hỏng vặt mà nhà cung
    cấp không hỗ trợ kịp thời, comment cho mình biết nhé. Mình sẽ gợi ý cho bạn những
    bước kiểm tra nhanh để tránh mất thời gian và tiền bạc.
  background: phòng làm việc hiện đại, ánh sáng ấm, điện thoại và laptop trên bàn
  characters:
  - Mentor
