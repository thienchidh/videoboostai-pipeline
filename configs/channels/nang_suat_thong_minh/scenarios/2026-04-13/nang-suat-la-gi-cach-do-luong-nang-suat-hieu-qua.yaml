title: Năng Suất Là Gì ? Cách Đo Lường Năng Suất Hiệu Quả
scenes:
- id: 1
  script: Bạn có biết không? Người Nhật làm việc ít hơn chúng ta nhưng năng suất cao
    gấp 3 lần. Vậy bí quyết của họ là gì? Mình sẽ tiết lộ ngay đây!
  background: văn phòng hiện đại với đồ họa 3D, ánh sáng ấm, eye-level, modern office,
    professional
  character: Mentor
- id: 2
  script: 'Năng suất không phải là làm nhiều việc, mà là làm đúng việc. Công thức
    đơn giản: lấy sản lượng chia cho thời gian. Ví dụ, thay vì ngồi làm 10 tiếng lề
    mề, bạn tập trung 2 tiếng cho kết quả tốt nhất.'
  background: văn phòng hiện đại với đồ họa 3D, ánh sáng ấm, eye-level, modern office,
    professional
  character: Mentor
- id: 3
  script: Giờ thì áp dụng thử đi, bạn đang dùng cách nào để đo năng suất của mình?
    Comment cho mình biết để cùng thảo luận nhé!
  background: văn phòng hiện đại với đồ họa 3D, ánh sáng ấm, eye-level, modern office,
    professional
  character: Student
