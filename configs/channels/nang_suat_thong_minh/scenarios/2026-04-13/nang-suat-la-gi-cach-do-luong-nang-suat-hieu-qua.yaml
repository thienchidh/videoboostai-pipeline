title: Năng Suất Là Gì ? Cách Đo Lường Năng Suất Hiệu Quả
scenes:
- id: 1
  script: 90% người đi làm không biết năng suất của mình đang ở đâu. Bạn có nằm trong
    số đó không? Trong một ngày làm việc, có khoảng bao nhiêu giờ thực sự hiệu quả?
  background: văn phòng hiện đại, ánh sáng xanh, 3D render
  characters:
  - Mentor
- id: 2
  script: 'Năng suất không phải là làm nhiều, mà là làm đúng việc. Công thức đơn giản:
    đầu ra chia cho đầu vào. Nhân viên A hoàn thành 10 task trong 8 giờ, nhân viên
    B hoàn thành 15 task trong 6 giờ — bạn đoán xem ai năng suất hơn?'
  background: phòng họp trong suốt, đồ họa data, neon
  characters:
  - Mentor
  - Student
- id: 3
  script: Bạn đã xác định được mục tiêu năng suất cho tuần này chưa? Nếu chưa, hãy
    bắt đầu từ hôm nay bằng việc ghi lại thời gian làm việc trong khoảng 3 ngày liên
    tiếp nhé!
  background: góc làm việc cá nhân, cây xanh, đèn bàn
  characters:
  - Mentor
