title: Năng suất là gì? Công thức tính năng suất (chi tiết ...
scenes:
- id: 1
  script: Bạn làm việc 10 tiếng một ngày nhưng vẫn không xong việc? Vấn đề không phải
    là bạn lười — mà là bạn chưa hiểu năng suất thật sự là gì. Năng suất không phải
    làm nhiều, mà là làm đúng cách để ra kết quả tối đa với thời gian tối thiểu. Nghe
    có vẻ đơn giản, nhưng 90% người đang làm sai điều này mỗi ngày.
  background: bàn làm việc ngổn ngang giấy tờ, 3D render, warm, eye-level, modern
    office, professional
  character: Mentor
- id: 2
  script: 'Công thức tính năng suất cực kỳ đơn giản: Năng suất bằng Kết quả đầu ra
    chia cho Nguồn lực đầu vào. Ví dụ bạn viết được 5 bài báo cáo trong 5 tiếng, năng
    suất của bạn là 1 bài mỗi tiếng. Nhưng nếu bạn dùng công cụ hỗ trợ và làm được
    5 bài trong 2 tiếng, năng suất tăng gấp 2,5 lần mà không cần làm thêm giờ. Đó
    chính là sức mạnh của việc hiểu đúng công thức này.'
  background: màn hình hiển thị biểu đồ tăng trưởng sắc nét, 3D render, warm, eye-level,
    modern office, professional
  character: Mentor
- id: 3
  script: Vậy bạn đang đo năng suất của mình theo cách nào? Theo số giờ ngồi làm,
    hay theo kết quả thực sự tạo ra? Thử áp dụng công thức này vào công việc ngày
    mai và xem con số của bạn là bao nhiêu nhé. Comment kết quả xuống dưới cho mình
    biết — mình đọc hết đó!
  background: góc văn phòng gọn gàng với cây xanh nhỏ, 3D render, warm, eye-level,
    modern office, professional
  character: Mentor
