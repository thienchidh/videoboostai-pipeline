title: PRODUCTIVITY Definition & Meaning - Merriam-Webster
scenes:
- id: 1
  script: Đừng tin khi người ta nói năng suất là làm thật nhiều việc trong một ngày.
    Merriam-Webster định nghĩa nó hoàn toàn khác. Và đây là lý do hầu hết chúng ta
    đều đang làm sai.
  background: văn phòng hiện đại ánh sáng vàng nhân tạo 3D render
  characters:
  - Mentor
- id: 2
  script: Theo Merriam-Webster, năng suất là khả năng tạo ra kết quả có giá trị từ
    công việc mình làm. Một sinh viên học 10 tiếng nhưng không hiểu bài, khác gì một
    nhân viên ngồi máy tính 8 tiếng nhưng chỉ lướt mạng. Điều quan trọng là chất lượng
    đầu ra, không phải số giờ đầu vào.
  background: thư viện đơn giản ánh sáng tự nhiên 3D render
  characters:
  - Mentor
- id: 3
  script: Vậy theo bạn, làm sao để biết mình đang thật sự năng suất thay vì chỉ bận
    rộn? Comment cho mình biết cách bạn đang đo lường năng suất của mình nhé!
  background: phòng làm việc cá nhân ánh sáng ấm studio
  characters:
  - Mentor
