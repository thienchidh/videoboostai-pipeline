title: PRODUCTIVITY Definition & Meaning - Merriam-Webster
scenes:
- id: 1
  script: Bạn có biết không? Người làm việc 12 tiếng một ngày, lại kém năng suất hơn
    người làm 6 tiếng. Đó là vì họ không hiểu năng suất là gì.
  background: văn phòng hiện đại, ánh sáng ấm, 3D render
  characters:
  - Mentor
- id: 2
  script: Theo Merriam-Webster, năng suất là trạng thái chất lượng hoặc sự sinh ra
    kết quả có giá trị. Nghĩa là bạn không chỉ bận, mà phải tạo ra thứ có ý nghĩa.
    Như một học sinh học smart, hiểu bài nhanh hơn 3 lần so với học vẹt.
  background: phòng học trung bình, bảng trắng, ánh sáng tự nhiên
  characters:
  - Mentor
  - Student
- id: 3
  script: Vậy bạn đang làm việc smart hay chỉ đang bận thôi? Hãy comment cho mình
    biết, mình sẽ giúp bạn cải thiện ngay.
  background: quán cafe yên tĩnh, ly cà phê, ánh sáng vàng
  characters:
  - Mentor
