title: PRODUCTIVITY Definition & Meaning - Merriam-Webster
scenes:
- id: 1
  script: 90% mọi người hiểu sai về năng suất. Bạn có thuộc 10% còn lại không? Mình
    từng nghĩ cứ làm nhiều là sẽ hiệu quả, nhưng hóa ra hoàn toàn sai lầm.
  background: văn phòng hiện đại, ánh sáng ấm, 3D render
  characters:
  - Mentor
- id: 2
  script: Theo Merriam-Webster, năng suất là chất lượng và trạng thái của việc tạo
    ra kết quả. Tức là không phải cứ bận rộn là năng suất, mà là làm ra giá trị trong
    thời gian ngắn nhất. Ví dụ, bạn làm một bài báo cáo mất 2 tiếng nhưng có người
    chỉ mất 30 phút với kết quả tốt hơn. Đó mới là năng suất đích thực.
  background: phòng làm việc chia sẻ, cà phê, sáng tạo
  characters:
  - Mentor
  - Student
- id: 3
  script: Bạn đang áp dụng định nghĩa nào về năng suất? Comment cho mình biết quan
    điểm của bạn nhé, mình sẽ đi sâu hơn ở video tiếp theo!
  background: studio quay chuyên nghiệp, ánh sáng rực rỡ
  characters:
  - Mentor
