title: Productivity - Wikipedia
scenes:
- id: 1
  script: 87% người đi làm đo năng suất sai cách, không phải bằng thời gian đâu! Đó
    là lý do họ luôn bận rộn nhưng hiệu quả lại thấp.
  background: văn phòng hiện đại, ánh sáng tự nhiên, cận cảnh mentor
  characters:
  - Mentor
- id: 2
  script: Năng suất thật sự được tính bằng kết quả chia cho thời gian, không phải
    số việc làm xong. Như khi bạn học, thay vì đếm bao nhiêu bài, hãy đo mình hiểu
    được bao nhiêu phần trăm sau mỗi giờ.
  background: phòng học sáng sạch, bảng trắng, student đang ghi chép
  characters:
  - Mentor
  - Student
- id: 3
  script: Từ nay bạn tính năng suất theo kết quả thay vì ngồi đếm giờ nhé. Cách nào
    hiệu quả hơn với bạn? Comment cho mình biết đi!
  background: noti bình luận trending, hiệu ứng nhẹ, góc nhìn gần
  characters:
  - Mentor
