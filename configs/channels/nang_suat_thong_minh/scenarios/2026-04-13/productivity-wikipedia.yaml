title: Productivity - Wikipedia
scenes:
- id: 1
  script: Bạn có biết 90% người làm việc 8 tiếng nhưng hiệu suất chỉ bằng 3 tiếng
    không? Đó là lý do vì sao nhiều người luôn bận rộn nhưng kết quả lại ít ỏi. Vậy
    năng suất thật sự là gì?
  background: văn phòng hiện đại với đồng hồ treo tường, góc nhìn nghiêng
  characters:
  - Mentor
- id: 2
  script: Năng suất là tỷ lệ giữa đầu ra và đầu vào. Nghĩa đơn giản là cùng một nguồn
    lực, bạn tạo ra được bao nhiêu giá trị. Ví dụ cùng một ngày làm việc, người A
    hoàn thành 10 task trong khi người B chỉ xong 3. Đầu ra càng lớn so với đầu vào,
    năng suất càng cao. Đây là công thức chung cho cả sản xuất hàng hóa lẫn cung cấp
    dịch vụ.
  background: bảng trắng có công thức minh họa, ánh sáng tự nhiên chiếu vào
  characters:
  - Mentor
  - Student
- id: 3
  script: 'Thử hỏi bản thân xem: Bạn đang dùng bao nhiêu phần trăm thời gian làm việc
    hiệu quả mỗi ngày? Comment cho mình biết con số đó nhé, mình sẽ đọc hết!'
  background: không gian văn phòng ấm áp, cốc cà phê trên bàn làm việc
  characters:
  - Mentor
