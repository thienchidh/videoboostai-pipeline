title: Productivity - Wikipedia
scenes:
- id: 1
  script: Bạn có biết không? Năng suất không phải là càng làm nhiều càng tốt đâu!
  background: Phòng làm việc hiện đại, ánh sáng vàng nhẹ, 3D render
  characters:
  - Student
- id: 2
  script: Wikipedia nói rằng năng suất là tỷ lệ giữa đầu ra và đầu vào. Nhưng thực
    ra, năng suất thông minh là làm ít hơn mà đạt kết quả cao hơn. Ví dụ, thay vì
    ngồi làm 10 tiếng, hãy tập trung 2 tiếng đầu tiên vào công việc quan trọng nhất,
    rồi nghỉ ngơi. Hiệu quả sẽ tăng gấp 3 lần đấy!
  background: Văn phòng coworking, cốc cà phê, laptop, 3D render
  characters:
  - Mentor
  - Student
- id: 3
  script: Vậy bạn đang áp dụng cách nào để tăng năng suất? Comment cho mình biết nhé,
    mình sẽ đọc hết!
  background: Studio simple, ánh sáng chính diện, mic podcast
  characters:
  - Mentor
