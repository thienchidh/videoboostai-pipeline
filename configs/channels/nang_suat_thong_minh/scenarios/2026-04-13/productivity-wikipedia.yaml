title: Productivity - Wikipedia
scenes:
- id: 1
  script: Bạn có biết? Phần lớn mọi người đều bị đánh lừa bởi một từ! Người ta nói
    'năng suất' nhưng thường chỉ nghĩ đến việc làm nhiều hơn, thật ra không phải vậy!
  background: phòng làm việc hiện đại, ánh sáng ấm, 3D render
  characters:
  - Mentor
- id: 2
  script: 'Năng suất thực ra là tỷ lệ giữa đầu ra và đầu vào. Cùng một công việc,
    người A hoàn thành trong 2 tiếng, người B chỉ mất 30 phút. Câu hỏi là: bạn đang
    ở đâu trong tỷ lệ đó?'
  background: bàn làm việc có laptop, sổ ghi chú, cốc cà phê
  characters:
  - Mentor
  - Student
- id: 3
  script: Bạn có muốn cải thiện tỷ lệ năng suất của mình không? Hãy comment cho mình
    biết bạn đang dùng mẹo nào để hoàn thành công việc nhanh hơn nhé!
  background: không gian mở, ánh sáng tự nhiên, plant-based
  characters:
  - Student
