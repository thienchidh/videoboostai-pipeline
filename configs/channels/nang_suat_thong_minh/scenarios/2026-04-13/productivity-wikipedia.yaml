title: Productivity - Wikipedia
scenes:
- id: 1
  script: Bạn có biết không? Năng suất lao động của người Việt Nam chỉ bằng 1/10 so
    với các nước phát triển. Vậy tại sao chúng ta phải làm việc nhiều hơn mà hiệu
    quả lại thấp hơn?
  background: văn phòng hiện đại, ánh sáng xanh lạnh, cận cảnh khuôn mặt
  characters:
  - Mentor
- id: 2
  script: Wikipedia định nghĩa năng suất là tổng hợp các phép đo hiệu quả. Tức là
    chúng ta cần đo lường đầu vào và đầu ra. Ví dụ, thay vì ngồi làm 10 tiếng, hãy
    tập trung 90 phút đầu vào tối đa rồi nghỉ ngơi. Đó là cách tính năng suất thực
    tế.
  background: bảng trắng có sơ đồ quy trình, phòng họp ánh sáng tự nhiên
  characters:
  - Mentor
- id: 3
  script: Bạn đang áp dụng phương pháp nào để đo năng suất của mình? Comment cho mình
    biết nhé, và đừng quên xem tiếp video để mình chia sẻ thêm nhiều tips thực tế
    hơn!
  background: ' không gian làm việc sáng tạo, ánh sáng vàng ấm, plants xung quanh'
  characters:
  - Mentor
