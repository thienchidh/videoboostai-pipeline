title: Productivity - Wikipedia
scenes:
- id: 1
  script: Bạn có biết Wikipedia định nghĩa năng suất là gì không? Câu trả lời có thể
    sẽ khiến bạn bất ngờ đấy.
  background: phòng làm việc hiện đại, ánh sáng vàng ấm, 3D render
  characters:
  - Mentor
- id: 2
  script: 'Theo Wikipedia, năng suất là tỷ số giữa đầu ra và đầu vào. Tỷ số này thường
    được biểu diễn bằng công thức: năng suất bằng kết quả chia cho công sức. Muốn
    tăng năng suất, bạn cần hoặc tạo ra nhiều hơn với cùng công sức, hoặc đạt kết
    quả tương tự với ít hơn. Đó là hai con đường để cải thiện hiệu suất làm việc mỗi
    ngày.'
  background: văn phòng có biểu đồ tỷ số, bảng trắng, phong cách công nghệ
  characters:
  - Mentor
- id: 3
  script: Nếu video này hữu ích với bạn, hãy like, follow kênh Năng Suất Thông Minh
    và chia sẻ cho bạn bè cùng xem nhé!
  background: màn hình điện thoại với logo kênh, nền gradient xanh dương
  characters:
  - Mentor
