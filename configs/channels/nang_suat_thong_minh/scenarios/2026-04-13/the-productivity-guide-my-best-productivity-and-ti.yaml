title: 'The Productivity Guide: My Best Productivity and Time-Management Tips'
scenes:
- id: 1
  script: Bạn có biết bạn đang lãng phí tới 2 tiếng mỗi ngày cho những việc vô bổ
    không? Mình từng như vậy đấy, làm việc cật lực mà kết quả lại tệ hại.
  background: văn phòng hiện đại, ánh sáng ấm, 3D render, eye-level, modern office,
    professional
  character: Mentor
- id: 2
  script: Mình đã áp dụng nguyên tắc 90 phút và thấy hiệu suất tăng gấp 3 lần. Chỉ
    cần tập trung tuyệt đối trong 90 phút rồi nghỉ ngơi 20 phút, não bộ phục hồi hoàn
    toàn và sẵn sàng cho phiên làm việc tiếp theo.
  background: văn phòng hiện đại, ánh sáng ấm, 3D render, eye-level, modern office,
    professional
  character: Mentor
- id: 3
  script: Bạn đã thử cách nào trong số này chưa? Comment cho mình biết cách nào hiệu
    quả nhất với bạn nhé, mình rất tò mò đấy!
  background: văn phòng hiện đại, ánh sáng ấm, 3D render, eye-level, modern office,
    professional
  character: Mentor
