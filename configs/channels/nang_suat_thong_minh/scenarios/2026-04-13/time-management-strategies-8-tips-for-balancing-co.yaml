title: 'Time Management Strategies: 8 Tips for Balancing College and Life'
scenes:
- id: 1
  script: Bạn có biết sinh viên đại học trung bình lãng phí tới 5 tiếng mỗi ngày vào
    việc gì? Đó là toàn bộ thời gian bạn có thể dùng để học, làm thêm, hoặc đơn giản
    là nghỉ ngơi. Thay vì cuộc sống như một cỗ máy chạy marathon, hãy để mình chỉ
    bạn cách sống như một người chiến thắng.
  background: văn phòng hiện đại với ánh sáng ấm, render 3D, eye-level, hiện đại,
    chuyên nghiệp
  character: Student
- id: 2
  script: 'Mẹo đầu tiên: áp dụng nguyên tắc 90 phút. Mình từng thấy một bạn sinh viên
    chia ngày thành 3 block, mỗi block 90 phút tập trung hoàn toàn vào một môn. Kết
    quả là điểm trung bình tăng từ 2.5 lên 3.5 chỉ trong một học kỳ. Không cần học
    nhiều hơn, chỉ cần học thông minh hơn.'
  background: văn phòng hiện đại với ánh sáng ấm, render 3D, eye-level, hiện đại,
    chuyên nghiệp
  character: Mentor
- id: 3
  script: Bạn đã thử cách nào trong số này rồi? Hay bạn đang vật lộn với việc cân
    bằng giữa học tập và cuộc sống? Comment cho mình biết dưới video, mình sẽ đọc
    và reply từng người nhé!
  background: văn phòng hiện đại với ánh sáng ấm, render 3D, eye-level, hiện đại,
    chuyên nghiệp
  character: Mentor
