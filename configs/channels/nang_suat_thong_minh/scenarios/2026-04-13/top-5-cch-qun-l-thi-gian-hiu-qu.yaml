title: Top 5 cách quản lý thời gian hiệu quả
scenes:
- id: 1
  script: Bạn có biết người bình thường lãng phí tới 2.5 giờ mỗi ngày chỉ vì không
    biết cách sắp xếp công việc? Nghe thì khó tin nhưng đó là sự thật đấy!
  background: phòng làm việc hiện đại, ánh sáng vàng nhẹ, camera eye-level
  characters:
  - Mentor
- id: 2
  script: 'Cách thứ nhất: quy tắc 2 phút. Nếu công việc nào làm trong 2 phút xong,
    hãy làm ngay, đừng hoãn lại. ví dụ như trả lời tin nhắn nhanh, sắp xếp giấy tờ,
    hay gửi một email ngắn. Mình áp dụng cách này từ năm ngoái, hiệu suất làm việc
    tăng lên rõ rệt.'
  background: góc bàn làm việc với laptop và đồng hồ, background blur nhẹ
  characters:
  - Mentor
- id: 3
  script: Vậy bạn đang dùng cách nào để quản lý thời gian? Là quy tắc 2 phút, hay
    kỹ thuật Pomodoro? Comment cho mình biết để mình có thể chia sẻ thêm nhé!
  background: phòng khách thân thiện, ánh sáng tự nhiên, camera nghiêng nhẹ
  characters:
  - Mentor
  - Student
