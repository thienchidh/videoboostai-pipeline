title: What Is Productivity? Definition and Ways to Improve
scenes:
- id: 1
  script: Bạn có biết người bình thường lãng phí tới 2 tiếng rưỡi mỗi ngày không?
    Đó là cả một năm bạn đã đánh mất. Vậy năng suất thật sự là gì? Không phải là làm
    nhiều hơn, mà là làm đúng hơn.
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Mentor
- id: 2
  script: 'Công thức đơn giản: Năng suất bằng đầu ra chia cho thời gian đầu vào. Nghĩa
    là cùng một công việc, bạn làm nhanh hơn và kết quả tốt hơn. Ví dụ, thay vì đọc
    email liên tục, hãy check mail 3 lần một ngày, bạn sẽ tiết kiệm được cả tiếng
    đồng hồ.'
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Mentor
- id: 3
  script: Vậy bạn đang áp dụng mẹo nào để tăng năng suất rồi? Comment cho mình biết
    bên dưới nhé, biết đâu mình có thể giúp bạn cải thiện thêm!
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Mentor
