title: What is productivity? | McKinsey
scenes:
- id: 1
  script: Bạn có biết 80% nhân viên tự nhận mình làm việc hiệu quả, nhưng sếp lại
    nghĩ ngược lại hoàn toàn? Đây là lý do vì sao năng suất không chỉ là làm nhiều
    việc hơn.
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Mentor
- id: 2
  script: Theo McKinsey, năng suất là tỷ lệ giữa đầu ra và đầu vào. Nghĩa là bạn đạt
    được bao nhiêu kết quả với bao nhiêu nguồn lực. Ví dụ, một quán cà phê pha 100
    ly mỗi giờ với 2 người thì năng suất là 50 ly mỗi người mỗi giờ.
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Student
- id: 3
  script: Bạn đang dùng cách nào để đo năng suất của chính mình? Comment cho mình
    biết nhé, để xem liệu cách bạn đang áp dụng có thực sự hiệu quả không.
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Mentor
