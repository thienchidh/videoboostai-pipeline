title: 8 Time Management Tips for Students - Harvard Summer School
scenes:
- id: 1
  script: Bạn có từng tự hỏi, mình lãng phí bao nhiêu giờ mỗi ngày không? Đa số học
    sinh, sinh viên thường không nhận ra rằng họ đã đánh mất tới 2 tiếng đồng hồ chỉ
    vì không biết quản lý thời gian. Thử hỏi chính bạn, tuần vừa rồi bạn đã làm được
    gì với thời gian của mình? Câu trả lời có thể khiến bạn bất ngờ đấy. Nghe có vẻ
    quen thuộc không?
  background: văn phòng hiện đại với ánh sáng ấm, 3D render, eye-level, modern office,
    professional
  character: Mentor
- id: 2
  script: 'Mẹo đầu tiên: hãy lên lịch cho những việc quan trọng trước. Thay vì nghĩ
    ''sẽ làm khi rảnh'', bạn chủ động đặt giờ cụ thể cho chúng. Ví dụ, mùa hè này
    mình dành 9 giờ sáng mỗi ngày để học, không có ngoại lệ. Kết quả là vừa hoàn thành
    khóa học, vừa có thời gian nghỉ ngơi. Điều quan trọng là bạn phải thật sự cam
    kết với lịch trình của mình.'
  background: bàn làm việc trong văn phòng hiện đại, ánh sáng warm, 3D render, eye-level,
    modern office, professional
  character: Student
- id: 3
  script: Vậy bạn đã thử cách nào trong số này rồi? Comment cho mình biết cách nào
    phù hợp với bạn nhất nhé. Mình rất tò mò muốn biết các bạn quản lý thời gian thế
    nào. Đừng quên xem hết series để cập nhật thêm nhiều tips bổ ích từ Harvard Summer
    School!
  background: không gian văn phòng ấm cúng, 3D render, eye-level, modern office, professional
  character: Mentor
