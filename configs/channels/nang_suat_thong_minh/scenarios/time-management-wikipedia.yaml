title: Time management - Wikipedia
scenes:
- id: 1
  script: Bạn có biết 90% người thất bại trong công việc không phải vì thiếu năng
    lực, mà vì không biết quản lý thời gian? Đó là lý do họ luôn bị cuốn theo deadline
    và cảm thấy áp lực triền miên. Còn bạn thì sao? Bạn đang để thời gian điều khiển
    cuộc sống hay đang nắm quyền kiểm soát?
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Mentor
- id: 2
  script: Trước đây mình từng làm việc 10 tiếng một ngày mà vẫn không xong việc. Sau
    khi áp dụng kỹ thuật ghi chép thời gian, mình phát hiện ra mình dành tận 3 tiếng
    lướt mạng xã hội mỗi ngày. Chỉ cần cắt giảm một nửa thời gian đó, mình đã hoàn
    thành công việc hiệu quả hơn gấp đôi.
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Student
- id: 3
  script: Quản lý thời gian không phải là nhồi nhét thật nhiều việc vào một ngày,
    mà là biết ưu tiên đúng việc đúng lúc. Điều quan trọng là cam kết với chính mình
    và có kế hoạch cụ thể. Bạn đã thử cách nào trong số này chưa? Comment cho mình
    biết nhé!
  background: văn phòng hiện đại, 3D render, warm, eye-level, modern office, professional
  character: Mentor
