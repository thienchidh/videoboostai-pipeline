title: What Is Productivity and How to Measure It
scenes:
- id: 1
  script: Bạn có biết 80% nhân viên văn phòng không biết mình làm việc năng suất hay
    không? Câu trả lời sẽ khiến bạn bất ngờ đấy!
  background: văn phòng hiện đại với đồ họa 3D render, warm, eye-level, modern office,
    professional
  character: Mentor
- id: 2
  script: Năng suất đơn giản là số kết quả chia cho thời gian và công sức bạn bỏ ra.
    Ví dụ, nếu bạn hoàn thành 5 báo cáo trong 2 giờ thì năng suất của bạn là 2.5 báo
    cáo mỗi giờ. Đó mới là cách đo lường đúng.
  background: văn phòng hiện đại với biểu đồ 3D render, warm, eye-level, modern office,
    professional
  character: Mentor
- id: 3
  script: Bạn đã bao giờ thử đo năng suất của chính mình chưa? Hãy comment cho mình
    biết bạn dùng cách nào để đo lường nhé!
  background: văn phòng hiện đại 3D render, warm, eye-level, modern office, professional
  character: Mentor
