title: 'What is Productivity? : U.S. Bureau of Labor Statistics'
scenes:
- id: 1
  script: Bạn có biết cứ mỗi giờ làm việc, người Mỹ tạo ra giá trị gấp đôi người Việt
    Nam không? Theo Cục Thống Kê Lao Động Mỹ, năng suất chính là so sánh giữa sản
    lượng đầu ra với các nguồn lực đã bỏ vào. Nói thẳng luôn, đây là lý do vì sao
    nhiều công ty Việt vẫn chưa bứt phá được.
  background: văn phòng hiện đại, ánh sáng ấm, 3D render, eye-level, modern office,
    professional
  character: Mentor
- id: 2
  script: 'Năng suất đơn giản là câu hỏi: Bạn tạo ra bao nhiêu giá trị từ bao nhiêu
    thời gian và công sức? Ví dụ cụ thể nhé, một nhân viên có thể ngồi máy tính 8
    tiếng nhưng chỉ thực sự làm việc hiệu quả 3 tiếng. Thay vì cố gắng ngồi lâu hơn,
    hãy tập trung vào việc tăng đầu ra chất lượng từ đầu vào sẵn có.'
  background: văn phòng hiện đại, ánh sáng ấm, 3D render, eye-level, modern office,
    professional
  character: Mentor
- id: 3
  script: Vậy bạn đang dùng bao nhiêu phần trăm thời gian làm việc thực sự hiệu quả
    mỗi ngày? Comment cho mình biết con số ước tính nhé, và đừng lo, mình sẽ chia
    sẻ cách cải thiện nó ngay trong video tiếp theo.
  background: văn phòng hiện đại, ánh sáng ấm, 3D render, eye-level, modern office,
    professional
  character: Student
