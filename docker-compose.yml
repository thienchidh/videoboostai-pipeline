services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: videopipeline_postgres
    environment:
      POSTGRES_DB: videopipeline
      POSTGRES_USER: videopipeline
      POSTGRES_PASSWORD: videopipeline123
    ports:
      - "5432:5432"
    volumes:
      - postgres_videopipeline:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videopipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_videopipeline:
